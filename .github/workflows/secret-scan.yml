name: Secret scan

# Scan every push and pull request for committed secrets (API keys, tokens,
# OAuth client secrets, private keys, etc.) so credentials never reach the
# remote — defence-in-depth alongside the local-only token handling in the
# server (NFR-SEC-1/6).

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Free for personal accounts and public repos; no license required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Never print secret values into the workflow logs.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
